name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run tests
        run: ./scripts/run-tests.sh

      - name: Build release app
        run: ./scripts/build-release.sh

      - name: Upload release app artifact
        uses: actions/upload-artifact@v4
        with:
          name: HackerNewsApp-release
          path: build/Release/Hacker News.app

  release:
    name: Create GitHub Release
    runs-on: macos-15
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release app
        run: ./scripts/build-release.sh

      - name: Package app bundle
        run: |
          cd build/Release
          ditto -c -k --sequesterRsrc --keepParent "Hacker News.app" "HackerNewsApp-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "build/Release/HackerNewsApp-${GITHUB_REF_NAME}.zip" \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
