name: Auto Create Pull Request

on:
  create:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Create PR to main
    if: github.event.ref_type == 'branch' && (startsWith(github.event.ref, 'feature/') || startsWith(github.event.ref, 'fix/'))
    runs-on: ubuntu-latest

    steps:
      - name: Create pull request if missing
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.event.ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          existing_pr="$(gh pr list \
            --repo "$REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "$existing_pr" ]; then
            echo "Pull request #$existing_pr already exists for $BRANCH_NAME."
            exit 0
          fi

          gh pr create \
            --repo "$REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "$BRANCH_NAME" \
            --body "Automated pull request created from branch \`$BRANCH_NAME\`."
